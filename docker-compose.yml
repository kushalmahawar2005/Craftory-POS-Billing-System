# Craftory POS - PostgreSQL Database
# Start: docker compose up -d
# Stop:  docker compose down
# Logs:  docker compose logs db

services:
  db:
    image: postgres:16-alpine
    container_name: craftory_pos_db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: craftory_admin
      POSTGRES_PASSWORD: Craftory@POS2026
      POSTGRES_DB: craftory_pos
    volumes:
      - craftory_pg_data:/var/lib/postgresql/data

volumes:
  craftory_pg_data:
